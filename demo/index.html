<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover" />
    <!-- Mobile-friendly chrome: when the page is added to the home
         screen it launches as a standalone web-app (no URL bar). The
         theme-color tints the Android status bar to match the felt. -->
    <meta name="apple-mobile-web-app-capable" content="yes" />
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
    <meta name="mobile-web-app-capable" content="yes" />
    <meta name="theme-color" content="#0c6b3a" />
    <title>Solitaire</title>
    <style>
      /* Match Antidote's layout: the canvas has explicit dimensions
         and the body flex-centres it. JS computes the largest 4:3
         fit on resize and updates `canvas.style` accordingly.
         The 100%/100% full-viewport approach we tried earlier
         green-screened on some mobile browsers because of layout
         cascading; Antidote uses this letterbox pattern and works,
         so we match it for consistency. */
      html, body { margin: 0; padding: 0; width: 100%; height: 100%; overflow: hidden; background: #0c6b3a; }
      body { display: flex; align-items: center; justify-content: center; -webkit-tap-highlight-color: transparent; }
      canvas { display: block; touch-action: none; }
    </style>
  </head>
  <body>
    <canvas id="solitaire-canvas" width="1024" height="768"></canvas>
    <script type="module" src="/src/main.ts"></script>
  </body>
</html>
