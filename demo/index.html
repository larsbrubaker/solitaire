<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover" />
    <!-- Mobile-friendly chrome: when the page is added to the home
         screen it launches as a standalone web-app (no URL bar). The
         theme-color tints the Android status bar to match the felt. -->
    <meta name="apple-mobile-web-app-capable" content="yes" />
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
    <meta name="mobile-web-app-capable" content="yes" />
    <meta name="theme-color" content="#0c6b3a" />
    <title>Solitaire</title>
    <style>
      /* Canvas fills the entire viewport — letterboxing of the playfield
         happens inside the Rust app via `playfield_transform`, NOT here.
         Letterboxing in CSS would shrink the menu bar and HUD too,
         which is exactly the opposite of what we want on a phone. */
      html, body { margin: 0; padding: 0; width: 100%; height: 100%; overflow: hidden; background: #0c6b3a; }
      body { -webkit-tap-highlight-color: transparent; }
      canvas { display: block; width: 100%; height: 100%; touch-action: none; }
    </style>
  </head>
  <body>
    <canvas id="solitaire-canvas"></canvas>
    <script type="module" src="/src/main.ts"></script>
  </body>
</html>
