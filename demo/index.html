<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover" />
    <!-- Mobile-friendly chrome: when the page is added to the home
         screen it launches as a standalone web-app (no URL bar). The
         theme-color tints the Android status bar to match the felt. -->
    <meta name="apple-mobile-web-app-capable" content="yes" />
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
    <meta name="mobile-web-app-capable" content="yes" />
    <meta name="theme-color" content="#0c6b3a" />
    <!-- Favicon: inline SVG mirroring the procedural app icon
         in `solitaire_core::branding`. Felt-green tile with a
         white rounded-rect card and a red heart pip — readable
         at 16 px. Inline keeps the bundle a single artefact. -->
    <link rel="icon" type="image/svg+xml" href='data:image/svg+xml;utf8,<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 64 64"><rect width="64" height="64" fill="%230c522c"/><rect x="10" y="6" width="44" height="52" rx="5" ry="5" fill="white" stroke="%23333" stroke-width="1"/><path d="M 32 24 C 32 16 22 16 22 26 C 22 32 32 38 32 46 C 32 38 42 32 42 26 C 42 16 32 16 32 24 Z" fill="%23d01a1a"/></svg>' />
    <title>Solitaire</title>
    <style>
      /* Canvas fills the entire viewport. We avoid the
         html→body→canvas percent-height cascade that green-screened
         on Android Chrome earlier; instead the canvas has explicit
         buffer attributes (so the first paint sees a non-zero
         buffer) and main.ts sets `canvas.style.width/height` in CSS
         pixels off `window.innerWidth/innerHeight`. No CSS percent
         heights at all on the canvas itself. */
      html, body { margin: 0; padding: 0; width: 100%; height: 100%; overflow: hidden; background: #0c6b3a; }
      body { -webkit-tap-highlight-color: transparent; }
      canvas { display: block; position: absolute; top: 0; left: 0; touch-action: none; }
    </style>
  </head>
  <body>
    <canvas id="solitaire-canvas" width="1024" height="768"></canvas>
    <script type="module" src="/src/main.ts"></script>
  </body>
</html>
